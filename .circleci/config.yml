version: 2.1

orbs:
  snyk: snyk/snyk@2
  git-shallow-clone: guitarrapc/git-shallow-clone@2.8.0

jobs:
  format-check:
    docker:
      - image: maven:3.9.13-eclipse-temurin-25
    steps:
      - git-shallow-clone/checkout
      - restore_cache:
          keys:
            - deps-{{ checksum "pom.xml" }}
            - deps-
      - run:
          name: Format and Checkstyle
          command: mvn -f pom.xml validate --batch-mode

  security-snyk:
    docker:
      - image: maven:3.9.13-eclipse-temurin-25
    steps:
      - git-shallow-clone/checkout
      - restore_cache:
          keys:
            - deps-{{ checksum "pom.xml" }}
            - deps-
      - run:
          name: Install sudo
          command: apt-get update -qq && apt-get install -y sudo
      - snyk/scan:
          fail-on-issues: true
          monitor-on-build: true
          severity-threshold: high
          additional-arguments: --file=pom.xml --package-manager=maven --fail-on=upgradable

  build-test-analyze:
    docker:
      - image: maven:3.9.13-eclipse-temurin-25
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - restore_cache:
          keys:
            - deps-{{ checksum "pom.xml" }}
            - deps-
      - run:
          name: Build, test and analyze
          command: mvn -f pom.xml verify sonar:sonar --batch-mode
      - run:
          name: Collect test results
          when: always
          command: |
            mkdir -p /tmp/test-results
            find target/surefire-reports target/failsafe-reports -name 'TEST-*.xml' -exec cp {} /tmp/test-results/ \; 2>/dev/null || true
      - store_test_results:
          path: /tmp/test-results
      - save_cache:
          key: deps-{{ checksum "pom.xml" }}
          paths:
            - ~/.m2/repository
      - run:
          name: Deploy to Render
          command: curl -s "$RENDER_DEPLOY_HOOK_URL" > /dev/null

workflows:
  pipeline:
    jobs:
      - format-check
      - security-snyk
      - build-test-analyze:
          requires:
            - format-check
          context: SonarCloud
