spring:
  application:
    name: game-service
  config:
    import: classpath:future-events.yml
  jackson:
    default-property-inclusion: non_null
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:temporal_rift}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}
    consumer:
      group-id: game-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:9000}
  modulith:
    events:
      externalization:
        enabled: true
      republish-outstanding-events-on-restart: true
    runtime:
      verification-enabled: true

game:
  rules:
    min-players: 3
    max-players: 5
    max-eras: 5
    max-cascaded-paradoxes: 3
    events-per-era: 3
    action-round-timer-seconds:
      3: 60
      4: 45
      5: 30

logging:
  level:
    io.github.temporalrift: INFO