spring:
  application:
    name: game-service
  config:
    import: classpath:future-events.yml
  jackson:
    default-property-inclusion: non_null
  datasource:
    url: jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5432}/${SPRING_DATASOURCE_NAME:temporal_rift}?sslmode=require
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}
    consumer:
      group-id: game-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Raw bytes in, then spring-modulith-events-kafka's ByteArrayJacksonJsonMessageConverter
      # (auto-wired into the listener container factory) converts to the listener parameter type.
      # A JSON value-deserializer here would double-convert and fail with
      # "Only String, Bytes, or byte[] supported".
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # JacksonJsonSerializer (Jackson 3) — the Jackson 2 based JsonSerializer cannot handle
      # java.time.Instant (EventEnvelope.occurredAt) without extra modules. Type headers stay off
      # so consumers convert by listener parameter type, keeping the wire format header-free JSON.
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.add.type.headers: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:9000}
  modulith:
    events:
      externalization:
        enabled: true
      # Restart-bound republication is multi-instance-unsafe (replays in-flight work of live
      # instances); IncompleteEventPublicationResubmitter sweeps stale publications instead.
      republish-outstanding-events-on-restart: false
    runtime:
      verification-enabled: true

game:
  rules:
    min-players: 3
    max-players: 5
    max-eras: 5
    max-cascaded-paradoxes: 3
    events-per-era: 3
    cards-per-hand: 5
    win-score-threshold: 20
    reconnect-grace-period-seconds: 30
    action-round-timer-seconds:
      3: 60
      4: 45
      5: 30
    stabilization-winner-factions:
      - PROPHETS
      - WEAVERS
    scoring:
      card-shifts:
        PUSH: 20
        SUPPRESS: -20
        # Non-shifter cards: resolved at timeline resolution time, not during the band preview.
        AMPLIFY: 0
        INTERCEPT: 0
        SCAN: 0
        TRACE: 0
        DECOY: 0
        JAM: 0
        STALL: 0
        REDIRECT: 0
        NULLIFY: 0
        COLLIDE: 0
        STABILIZE: 0
        DETONATE: 0
      swing-shift: 30
      low-max-probability: 30
      medium-max-probability: 60

logging:
  level:
    io.github.temporalrift: INFO

server:
  address: 0.0.0.0
  port: ${PORT:8080}
