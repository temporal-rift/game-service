openapi: 3.0.3
info:
  title: Temporal Rift — Scoring API
  description: Score querying endpoints
  version: 1.0.0

servers:
  - url: /api/v1

security:
  - bearerAuth: [ ]

tags:
  - name: Scoring

paths:
  /games/{gameId}/scores:
    get:
      tags: [ Scoring ]
      operationId: getScores
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Current scores (factions hidden until game ends)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoresResponse'
        '404':
          description: |
            Game not found (`code: 404-01`).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /games/{gameId}/scores/history:
    get:
      tags: [ Scoring ]
      operationId: getScoresHistory
      parameters:
        - name: gameId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Full scoring history by era
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoresHistoryResponse'
        '404':
          description: |
            Game not found (`code: 404-01`).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Faction:
      type: string
      enum:
        - ERASERS
        - PROPHETS
        - REVISIONISTS
        - WEAVERS
        - ACTIVISTS

    PlayerScore:
      type: object
      required: [ playerId, playerName, score ]
      properties:
        playerId:
          type: string
          format: uuid
        playerName:
          type: string
        score:
          type: integer
        faction:
          $ref: '#/components/schemas/Faction'

    ScoresResponse:
      type: object
      required: [ gameId, eraNumber, scores ]
      properties:
        gameId:
          type: string
          format: uuid
        eraNumber:
          type: integer
        scores:
          type: array
          items:
            $ref: '#/components/schemas/PlayerScore'

    ScoreDelta:
      type: object
      required: [ playerId, pointsDelta, reason ]
      properties:
        playerId:
          type: string
          format: uuid
        pointsDelta:
          type: integer
        reason:
          type: string

    EraHistory:
      type: object
      required: [ eraNumber, deltas ]
      properties:
        eraNumber:
          type: integer
        deltas:
          type: array
          items:
            $ref: '#/components/schemas/ScoreDelta'

    ScoresHistoryResponse:
      type: object
      required: [ gameId, history ]
      properties:
        gameId:
          type: string
          format: uuid
        history:
          type: array
          items:
            $ref: '#/components/schemas/EraHistory'

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          description: A URI reference that identifies the problem type.
          format: uri
          maxLength: 1024
        status:
          type: integer
          description: The HTTP status code generated by the origin server for this occurrence of the problem.
          format: int32
          minimum: 100
          maximum: 599
        title:
          type: string
          description: A short, human-readable summary of the problem type. It should not change from occurrence to occurrence of the problem, except for purposes of localization.
          maxLength: 1024
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          maxLength: 4096
        instance:
          type: string
          description: A URI reference that identifies the specific occurrence of the problem. It may or may not yield further information if dereferenced.
          maxLength: 1024
        code:
          type: string
          description: An API specific error code aiding the provider team understand the error based on their own potential taxonomy or registry.
          maxLength: 50
        errors:
          type: array
          description: An array of error details to accompany a problem details response.
          maxItems: 1000
          items:
            type: object
            description: An object to provide explicit details on a problem towards an API consumer.
            properties:
              detail:
                type: string
                description: A granular description on the specific error related to a body property, query parameter, path parameters, and/or header.
                maxLength: 4096
              pointer:
                type: string
                description: A JSON Pointer to a specific request body property that is the source of error.
                maxLength: 1024
              parameter:
                type: string
                description: The name of the query or path parameter that is the source of error.
                maxLength: 1024
              header:
                type: string
                description: The name of the header that is the source of error.
                maxLength: 1024
              code:
                type: string
                description: A string containing additional provider specific codes to identify the error context.
                maxLength: 50
            required:
              - detail
      required:
        - detail
